spring.application.name=server

server.port=${APP_PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/app_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# email
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.name=${EMAIL_NAME}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}


# logging
# logging.level.root=OFF
logging.level.com.server=INFO
spring.jpa.show-sql=true

# embedding service (Python / local)
embedding.api.url=${EMBEDDING_API_URL:http://127.0.0.1:9000/api/embedding}

# jwt
jwt.secret=${JWT_SECRET:}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:}


# weather api
weather.api.url=${WEATHER_API_URL:https://api.weatherapi.com/v1/current.json}
weather.api.key=${WEATHER_API_KEY:}